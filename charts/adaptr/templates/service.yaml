{{- if not .Values.sidecar.enabled }}
# Service is not created in sidecar mode.
# The parent Deployment's existing Service handles traffic routing.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "adaptr.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "adaptr.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "adaptr.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ include "adaptr.serviceTargetPort" . }}
{{- end }}
