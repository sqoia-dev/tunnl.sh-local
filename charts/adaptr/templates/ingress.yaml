{{- if .Values.ingress.enabled }}
# Ingress is disabled by default (ingress.enabled=false).
# Enable only when adaptr is the edge entrypoint for external traffic.
# When running as a sidecar, leave disabled and rely on the parent Pod's Ingress.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "adaptr.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "adaptr.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "adaptr.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
